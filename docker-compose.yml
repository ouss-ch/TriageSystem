version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - rabbitmq
    volumes:
      - ./app:/app/app

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - rabbitmq
    volumes:
      - ./app:/app/app

  beat:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    command: ["celery", "-A", "app.core.celery_app", "beat", "--loglevel=info"]
    env_file: .env
    depends_on:
      - postgres
      - rabbitmq
    volumes:
      - ./app:/app/app

  postgres:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    env_file: .env
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

volumes:
  postgres-data:
  rabbitmq-data:
