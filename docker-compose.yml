version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - rabbitmq
      - llm
    volumes:
      - ./app:/app/app

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - rabbitmq
      - llm
    volumes:
      - ./app:/app/app

  beat:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    command: ["celery", "-A", "app.core.celery_app", "beat", "--loglevel=info"]
    env_file: .env
    depends_on:
      - postgres
      - rabbitmq
    volumes:
      - ./app:/app/app

  postgres:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    env_file: .env
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  llm:
    # OpenAI-compatible inference server serving a lightweight local model.
    # TODO: pin version tag; requires NVIDIA GPU + nvidia-container-toolkit on host.
    image: vllm/vllm-openai:latest
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HF_HUB_DISABLE_XET=1
    command:
      - "--model=${LLM_MODEL}"
      - "--max-model-len=4096"
      - "--gpu-memory-utilization=0.75"
      - "--api-key=${LLM_API_KEY}"
    ports:
      - "8001:8000"
    volumes:
      - hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  postgres-data:
  rabbitmq-data:
  hf-cache:
